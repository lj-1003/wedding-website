<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Compose</title>
    <link rel="stylesheet" href="static/css/guestbook_style.css">
</head>
<body>
<h1>Compose a Message</h1>

<div class="fillout">
    <form method="POST">
    
    <label for="content">Name</label>
    <textarea id="name" name="name" required="required" rows="2" cols="30"></textarea><br>

    <label for="content">Share a message with us!</label>
    <textarea id="content" name="content" required="required" rows="4" cols="30"></textarea><br>

    <input type="submit" value="Submit">
    </form>
</div>
</body>
</html>
