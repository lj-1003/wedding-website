<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../images/favicon.png">
    <title>Compose</title>
    <link rel="stylesheet" href="../static/css/guestbook_style.css">
</head>
<body>
    <a href="../pages/guestbook.html">
        <button class="form-buttons">Back to message list</button>
    </a>
    <main>
        <div class="fillout card">
            <h1>Compose a Message</h1>
            <form method="POST">
                <label for="content">Create a password*<br>Used to delete post later.</label>
                <textarea type="code" id="codeInput" name="codeInput" required="required" rows="2" cols="" maxlength="50"></textarea><br>

                <label for="content">Name*</label>
                <textarea id="nameInput" name="nameInput" required="required" rows="2" cols="30" maxlength="50"></textarea><br>

                <label for="content">Share a message with us!*</label>
                <textarea id="messageInput" name="messageInput" required="required" rows="4" cols="30" maxlength="150"></textarea><br>

                <button class="form-buttons" type="button" onclick="composeMessage()">Submit</button>
                <button class="form-buttons"type="button" onclick="resetForm()">Reset Form</button>
            </form>
        </div>
        <p>Inappropriate posts are subject to removal.<br>
            <br>Issues can be emailed to <a href="support@levieck.com">support@levieck.com</a>.
        </p>

        <p id="submitResponse"></p>
    </main>
    <footer>
		<p>&copy; 2026 Levi Eck</p>
	</footer>
    <script type="module" src="../js/guestbook.js"></script>
</body>
</html>
