<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../static/css/guestbook_style.css">
    <title>Guestbook</title>
    <style>
        .compose-button button {
            width: 100px;
	        height: 37px;
	        background-color: #21409A;
	        color: #FFFFFF;
	        border: none;
            cursor: pointer;
        }
        .compose-button button:hover {
            transform: scale(1.1);
	        transition: transform .25s ease;
        }

        body {
            font-family: Arial;
            text-align: center;
        }
        ul {
            list-style-type: none;
            padding-left: 0;
            margin: 0 auto;
        }

    </style>
</head>
<body>
    <h1>Guestbook</h1>

    <div class="compose-button">
        <a href="../pages/compose.html">
            <button>Compose a message</button>
        </a>
    </div>

    <ul id=message-list></ul>

    <script type="module" src="../js/guestbook.js"></script>
</body>
</html>
